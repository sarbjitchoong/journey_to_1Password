<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A cinematic canvas timeline and globe animation for Sarb's journey to 1Password."
    />
    <title>My Journey to 1Password</title>
    <link rel="stylesheet" href="styles.css?v=journey-62" />
  </head>
  <body>
    <canvas id="journey-canvas" aria-label="Animated personal journey from the Philippines to Canada"></canvas>

    <main class="stage" aria-live="polite">
      <header class="stage-header">
        <div class="brand-stack">
          <p class="brand-intro"><span>Hello, I'm</span> <strong>Sarb</strong></p>
          <a class="brand" href="#top" aria-label="Journey canvas home">
            <span class="brand-mark" aria-hidden="true">
              <img src="assets/1password-lock-blue.svg" alt="" />
            </span>
            <span>
              <strong>My Journey to 1Password</strong>
            </span>
          </a>
        </div>
      </header>

      <section class="hero" id="top">
        <div class="story-panel">
          <h1 id="hero-title">From running a restaurant to building <span>with data.</span></h1>
          <div class="headline-detail" id="headline-detail" aria-hidden="true"></div>
        </div>

        <aside class="chapter-card">
          <h2 id="chapter-title">Philippines</h2>
        </aside>
      </section>

      <section class="timeline-shell" aria-label="Animated journey timeline">
        <div class="timeline-topline">
          <span>Autoplay timeline</span>
          <div class="presenter-controls" aria-label="Presentation controls">
            <output id="timer-display" aria-label="Timeline time remaining">00:42 left</output>
            <button id="play-toggle" type="button" aria-label="Pause timeline">Pause</button>
            <button id="restart-button" type="button">Restart</button>
            <button id="stop-button" type="button">Stop</button>
          </div>
        </div>
        <div class="timeline-track" aria-label="Jump to a journey milestone">
          <div class="timeline-progress" id="timeline-progress"></div>
          <div class="timeline-nodes" id="timeline-nodes"></div>
        </div>
      </section>
    </main>

    <script src="vendor/d3.min.js"></script>
    <script src="vendor/topojson-client.min.js"></script>
    <script src="script.js?v=journey-62"></script>
  </body>
</html>
